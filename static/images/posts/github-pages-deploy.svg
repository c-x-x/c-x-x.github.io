<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>

    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 装饰圆圈 -->
  <circle cx="100" cy="100" r="150" fill="#ffffff" opacity="0.05"/>
  <circle cx="1100" cy="530" r="180" fill="#ffffff" opacity="0.05"/>
  <circle cx="950" cy="150" r="100" fill="#ffffff" opacity="0.08"/>

  <!-- 主要内容卡片 -->
  <rect x="80" y="80" width="1040" height="470" rx="20" fill="url(#cardBg)" stroke="#ffffff" stroke-width="2" opacity="0.9"/>

  <!-- GitHub Logo -->
  <g transform="translate(150, 140)">
    <circle cx="40" cy="40" r="45" fill="#ffffff" opacity="0.2"/>
    <path d="M40 10 C 23 10 10 23 10 40 C 10 53.8 18.4 65.4 30 69.5 C 31.5 69.8 32 68.8 32 68 V 63.2 C 24.5 64.8 22.8 59.8 22.8 59.8 C 21.5 56.5 19.5 55.5 19.5 55.5 C 16.8 53.8 19.7 53.8 19.7 53.8 C 22.7 54 24.2 56.8 24.2 56.8 C 26.8 61.2 31 60 32.2 59.2 C 32.5 57.2 33.2 56 34.2 55.2 C 27.7 54.5 20.8 52 20.8 40 C 20.8 36.8 21.8 34.2 24.2 32.2 C 23.8 31.5 22.8 28.5 24.5 24.5 C 24.5 24.5 27 23.8 32 27 C 34.2 26.5 36.5 26.2 40 26.2 C 43.5 26.2 45.8 26.5 48 27 C 53 23.8 55.5 24.5 55.5 24.5 C 57.2 28.5 56.2 31.5 55.8 32.2 C 58.2 34.2 59.2 36.8 59.2 40 C 59.2 52 52.2 54.5 45.8 55.2 C 47 56.2 48 58.2 48 61.2 V 68 C 48 68.8 48.5 69.8 50 69.5 C 61.5 65.5 70 53.8 70 40 C 70 23 57 10 40 10 Z"
          fill="#ffffff" filter="url(#glow)"/>
  </g>

  <!-- Hugo Logo -->
  <g transform="translate(950, 140)">
    <circle cx="40" cy="40" r="45" fill="#ffffff" opacity="0.2"/>
    <path d="M 25 20 L 25 60 L 35 60 L 35 45 L 45 45 L 45 60 L 55 60 L 55 20 L 45 20 L 45 37 L 35 37 L 35 20 Z"
          fill="#FF4088" filter="url(#glow)"/>
    <circle cx="62" cy="28" r="4" fill="#FFED4E"/>
  </g>

  <!-- 标题 -->
  <text x="600" y="200" font-family="'Inter', sans-serif" font-size="56" font-weight="800" fill="#ffffff" text-anchor="middle" filter="url(#glow)">
    Hugo + GitHub Pages
  </text>

  <!-- 副标题 -->
  <text x="600" y="260" font-family="'Inter', sans-serif" font-size="32" font-weight="600" fill="#ffffff" text-anchor="middle" opacity="0.9">
    自动化部署完全指南
  </text>

  <!-- 分隔线 -->
  <line x1="350" y1="300" x2="850" y2="300" stroke="#ffffff" stroke-width="2" opacity="0.3"/>

  <!-- 特性列表 -->
  <g transform="translate(250, 340)">
    <!-- 免费托管 -->
    <circle cx="15" cy="15" r="8" fill="#10B981"/>
    <text x="40" y="22" font-family="'Inter', sans-serif" font-size="24" font-weight="500" fill="#ffffff">
      ✓ 完全免费托管
    </text>

    <!-- 自动部署 -->
    <circle cx="15" cy="65" r="8" fill="#10B981"/>
    <text x="40" y="72" font-family="'Inter', sans-serif" font-size="24" font-weight="500" fill="#ffffff">
      ✓ GitHub Actions 自动部署
    </text>

    <!-- HTTPS -->
    <circle cx="15" cy="115" r="8" fill="#10B981"/>
    <text x="40" y="122" font-family="'Inter', sans-serif" font-size="24" font-weight="500" fill="#ffffff">
      ✓ 自带 HTTPS 和自定义域名
    </text>
  </g>

  <!-- 底部标签 -->
  <g transform="translate(600, 520)">
    <rect x="-180" y="-20" width="110" height="36" rx="18" fill="#ffffff" opacity="0.2"/>
    <text x="-125" y="4" font-family="'Inter', sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">
      CI/CD
    </text>

    <rect x="-50" y="-20" width="100" height="36" rx="18" fill="#ffffff" opacity="0.2"/>
    <text x="0" y="4" font-family="'Inter', sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">
      部署
    </text>

    <rect x="70" y="-20" width="110" height="36" rx="18" fill="#ffffff" opacity="0.2"/>
    <text x="125" y="4" font-family="'Inter', sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">
      教程
    </text>
  </g>
</svg>
