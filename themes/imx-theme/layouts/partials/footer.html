<footer class="footer">
  <div class="footer-content">
    {{ if .Site.Params.social }}
    <div class="footer-social">
      {{ if .Site.Params.social.github }}
      <a href="{{ .Site.Params.social.github }}" class="social-link" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
        <svg width="20" height="20" fill="currentColor"><use href="#icon-github"></use></svg>
      </a>
      {{ end }}
      {{ if .Site.Params.social.email }}
      <a href="mailto:{{ .Site.Params.social.email }}" class="social-link" aria-label="Email">
        <svg width="20" height="20" fill="currentColor"><use href="#icon-mail"></use></svg>
      </a>
      {{ end }}
    </div>
    {{ end }}

    <p class="footer-text">
      &copy; {{ now.Year }} {{ .Site.Title }}. All rights reserved.
    </p>
    <p class="footer-text">
      Powered by <a href="https://gohugo.io" target="_blank" rel="noopener">Hugo</a> & IMX Theme
    </p>
  </div>
</footer>
