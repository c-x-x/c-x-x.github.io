<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">IMX 配置检查与发布流程</title>
  <desc id="desc">从本地编辑、预览、构建检查、更新 Hugo Module 到 GitHub Pages 发布的流程图。</desc>
  <defs>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#0071e3"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
  </defs>
  <rect width="1400" height="760" rx="42" fill="#f8fafc"/>
  <text x="76" y="92" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="46" font-weight="840" fill="#111827">本地检查与发布流程</text>
  <text x="78" y="132" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="21" fill="#64748b">配置变化先本地预览，再构建验证，最后交给 GitHub Pages 自动部署。</text>
  <g font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">
    <g transform="translate(84 248)" filter="url(#shadow)">
      <rect width="210" height="164" rx="30" fill="#ffffff" stroke="#dbe7f3"/>
      <circle cx="105" cy="62" r="28" fill="url(#blue)"/>
      <text x="105" y="72" text-anchor="middle" font-size="28" font-weight="850" fill="#fff">1</text>
      <text x="105" y="118" text-anchor="middle" font-size="25" font-weight="780" fill="#111827">编辑配置</text>
    </g>
    <g transform="translate(354 248)" filter="url(#shadow)">
      <rect width="210" height="164" rx="30" fill="#ffffff" stroke="#dbe7f3"/>
      <circle cx="105" cy="62" r="28" fill="#111827"/>
      <text x="105" y="72" text-anchor="middle" font-size="28" font-weight="850" fill="#fff">2</text>
      <text x="105" y="118" text-anchor="middle" font-size="25" font-weight="780" fill="#111827">本地预览</text>
    </g>
    <g transform="translate(624 248)" filter="url(#shadow)">
      <rect width="210" height="164" rx="30" fill="#ffffff" stroke="#dbe7f3"/>
      <circle cx="105" cy="62" r="28" fill="url(#blue)"/>
      <text x="105" y="72" text-anchor="middle" font-size="28" font-weight="850" fill="#fff">3</text>
      <text x="105" y="118" text-anchor="middle" font-size="25" font-weight="780" fill="#111827">构建验证</text>
    </g>
    <g transform="translate(894 248)" filter="url(#shadow)">
      <rect width="210" height="164" rx="30" fill="#ffffff" stroke="#dbe7f3"/>
      <circle cx="105" cy="62" r="28" fill="#111827"/>
      <text x="105" y="72" text-anchor="middle" font-size="28" font-weight="850" fill="#fff">4</text>
      <text x="105" y="118" text-anchor="middle" font-size="25" font-weight="780" fill="#111827">提交推送</text>
    </g>
    <g transform="translate(1164 248)" filter="url(#shadow)">
      <rect width="210" height="164" rx="30" fill="#ffffff" stroke="#dbe7f3"/>
      <circle cx="105" cy="62" r="28" fill="url(#blue)"/>
      <text x="105" y="72" text-anchor="middle" font-size="28" font-weight="850" fill="#fff">5</text>
      <text x="105" y="118" text-anchor="middle" font-size="25" font-weight="780" fill="#111827">Pages 部署</text>
    </g>
  </g>
  <g stroke="#94a3b8" stroke-width="4" stroke-linecap="round" fill="none">
    <path d="M294 330H354"/>
    <path d="M564 330H624"/>
    <path d="M834 330H894"/>
    <path d="M1104 330H1164"/>
  </g>
  <g transform="translate(176 506)">
    <rect width="1048" height="118" rx="26" fill="#0b1220"/>
    <text x="44" y="48" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="24" fill="#e5eefb">hugo server</text>
    <text x="44" y="86" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="24" fill="#e5eefb">hugo --minify</text>
    <text x="360" y="48" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="24" fill="#93c5fd">hugo mod get github.com/c-x-x/hugo-theme-imx@latest</text>
    <text x="360" y="86" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="24" fill="#93c5fd">hugo mod tidy</text>
  </g>
</svg>
