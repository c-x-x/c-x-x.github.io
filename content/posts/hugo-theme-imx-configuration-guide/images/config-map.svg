<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">IMX 主题配置地图</title>
  <desc id="desc">展示 hugo.toml 中站点信息、主题参数、菜单、输出、Markdown 和评论配置之间的关系。</desc>
  <defs>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#0071e3"/>
      <stop offset="1" stop-color="#22c7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1400" height="760" rx="42" fill="#f7fbff"/>
  <text x="76" y="92" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="46" font-weight="840" fill="#111827">hugo.toml 配置地图</text>
  <text x="78" y="132" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="21" fill="#64748b">先确定站点基础信息，再配置主题行为，最后补充内容渲染和第三方服务。</text>
  <g font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">
    <g transform="translate(80 190)" filter="url(#shadow)">
      <rect width="360" height="188" rx="28" fill="#ffffff" stroke="#dbe7f3"/>
      <rect x="28" y="28" width="54" height="54" rx="18" fill="url(#blue)"/>
      <text x="104" y="62" font-size="28" font-weight="780" fill="#111827">站点基础</text>
      <text x="30" y="112" font-size="21" fill="#475569">baseURL / title / locale</text>
      <text x="30" y="148" font-size="21" fill="#475569">defaultContentLanguage</text>
    </g>
    <g transform="translate(520 190)" filter="url(#shadow)">
      <rect width="360" height="188" rx="28" fill="#ffffff" stroke="#dbe7f3"/>
      <rect x="28" y="28" width="54" height="54" rx="18" fill="#111827"/>
      <text x="104" y="62" font-size="28" font-weight="780" fill="#111827">主题参数</text>
      <text x="30" y="112" font-size="21" fill="#475569">description / subtitle / avatar</text>
      <text x="30" y="148" font-size="21" fill="#475569">logo / favicon / defaultImage</text>
    </g>
    <g transform="translate(960 190)" filter="url(#shadow)">
      <rect width="360" height="188" rx="28" fill="#ffffff" stroke="#dbe7f3"/>
      <rect x="28" y="28" width="54" height="54" rx="18" fill="#eaf4ff" stroke="#93c5fd"/>
      <text x="104" y="62" font-size="28" font-weight="780" fill="#111827">导航菜单</text>
      <text x="30" y="112" font-size="21" fill="#475569">menus.main</text>
      <text x="30" y="148" font-size="21" fill="#475569">pageRef / url / weight</text>
    </g>
    <g transform="translate(80 456)" filter="url(#shadow)">
      <rect width="360" height="188" rx="28" fill="#ffffff" stroke="#dbe7f3"/>
      <rect x="28" y="28" width="54" height="54" rx="18" fill="#eaf4ff" stroke="#93c5fd"/>
      <text x="104" y="62" font-size="28" font-weight="780" fill="#111827">内容渲染</text>
      <text x="30" y="112" font-size="21" fill="#475569">markup.highlight</text>
      <text x="30" y="148" font-size="21" fill="#475569">goldmark / tableOfContents</text>
    </g>
    <g transform="translate(520 456)" filter="url(#shadow)">
      <rect width="360" height="188" rx="28" fill="#ffffff" stroke="#dbe7f3"/>
      <rect x="28" y="28" width="54" height="54" rx="18" fill="#111827"/>
      <text x="104" y="62" font-size="28" font-weight="780" fill="#111827">搜索输出</text>
      <text x="30" y="112" font-size="21" fill="#475569">outputs.home</text>
      <text x="30" y="148" font-size="21" fill="#475569">HTML / RSS / JSON</text>
    </g>
    <g transform="translate(960 456)" filter="url(#shadow)">
      <rect width="360" height="188" rx="28" fill="#ffffff" stroke="#dbe7f3"/>
      <rect x="28" y="28" width="54" height="54" rx="18" fill="url(#blue)"/>
      <text x="104" y="62" font-size="28" font-weight="780" fill="#111827">外部服务</text>
      <text x="30" y="112" font-size="21" fill="#475569">social / giscus</text>
      <text x="30" y="148" font-size="21" fill="#475569">repoId / categoryId / themes</text>
    </g>
  </g>
  <g stroke="#94a3b8" stroke-width="3" stroke-linecap="round" opacity="0.58">
    <path d="M440 284H520"/>
    <path d="M880 284H960"/>
    <path d="M260 378V456"/>
    <path d="M700 378V456"/>
    <path d="M1140 378V456"/>
  </g>
</svg>
