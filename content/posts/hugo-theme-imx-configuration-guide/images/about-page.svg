<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">关于页面配置示意图</title>
  <desc id="desc">展示 IMX 主题关于页面由 params.avatar 和 content/about/index.md 的 layout about 共同控制。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1400" height="760" rx="42" fill="#f8fafc"/>
  <text x="76" y="92" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="46" font-weight="840" fill="#111827">关于页面：头像不写在正文里</text>
  <text x="78" y="132" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="21" fill="#64748b">头像属于页面结构信息，由主题模板渲染；Markdown 正文只写介绍内容。</text>
  <g transform="translate(90 204)" filter="url(#shadow)">
    <rect width="480" height="390" rx="32" fill="#0b1220"/>
    <text x="36" y="60" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="23" fill="#e5eefb">hugo.toml</text>
    <text x="36" y="118" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22" fill="#93c5fd">[params]</text>
    <text x="36" y="164" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22" fill="#e5eefb">avatar = "/images/imx/imx.jpg"</text>
    <text x="36" y="218" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22" fill="#e5eefb">subtitle = "写技术，也记录思路"</text>
    <text x="36" y="292" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="20" fill="#94a3b8">控制头像、站点副标题和联系方式</text>
  </g>
  <g transform="translate(830 204)" filter="url(#shadow)">
    <rect width="480" height="390" rx="32" fill="#ffffff" stroke="#dbe7f3"/>
    <text x="36" y="60" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="23" fill="#111827">content/about/index.md</text>
    <text x="36" y="118" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22" fill="#0f172a">+++</text>
    <text x="36" y="164" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22" fill="#0f172a">title = "关于"</text>
    <text x="36" y="210" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22" fill="#0071e3">layout = "about"</text>
    <text x="36" y="256" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22" fill="#0f172a">toc = false</text>
    <text x="36" y="302" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22" fill="#0f172a">+++</text>
    <text x="36" y="352" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="20" fill="#64748b">正文继续写个人介绍即可</text>
  </g>
  <g transform="translate(596 256)">
    <rect x="0" y="0" width="208" height="286" rx="38" fill="#ffffff" stroke="#dbe7f3" filter="url(#shadow)"/>
    <circle cx="104" cy="86" r="52" fill="#eaf4ff" stroke="#0071e3" stroke-width="8"/>
    <g transform="translate(104 86)" stroke="#0071e3" stroke-width="5" stroke-linecap="round" fill="none">
      <path d="M0-22v44"/>
      <path d="M-20-10l40 20"/>
      <path d="M20-10l-40 20"/>
    </g>
    <text x="104" y="176" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="26" font-weight="800" fill="#111827">关于页模板</text>
    <text x="104" y="218" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="18" fill="#64748b">读取 avatar</text>
    <text x="104" y="248" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="18" fill="#64748b">渲染头像模块</text>
  </g>
  <g stroke="#0071e3" stroke-width="5" stroke-linecap="round" fill="none">
    <path d="M570 398H596"/>
    <path d="M804 398H830"/>
  </g>
</svg>
